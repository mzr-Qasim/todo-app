<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Todo App</title>
    <link rel="stylesheet" href="assets/css/main.css" />
  </head>
  <body>
    <div class="site-wrapper">
      <header class="header">
        <nav class="navbar navbar-expand-lg main-navbar">
          <div class="container container-lg">
            <a class="navbar-brand" href="#"
              ><img class="site-logo" src="" alt=""
            /></a>
            <button
              class="navbar-toggler"
              type="button"
              data-bs-toggle="offcanvas"
              data-bs-target="#offcanvasRight"
              aria-controls="offcanvasRight"
            >
              <i class="icon-hamburger"></i>
            </button>
            <div class="collapse navbar-collapse">
              <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                <li class="nav-item">
                  <a
                    class="nav-link theme-links theme-links-animation"
                    href="#home"
                    >Home</a
                  >
                </li>
                <li class="nav-item">
                  <a
                    class="nav-link theme-links theme-links-animation"
                    href="#about_us"
                    >Resume</a
                  >
                </li>
                <li class="nav-item">
                  <a
                    class="nav-link theme-links theme-links-animation"
                    href="#solutions"
                    >Service</a
                  >
                </li>
                <li class="nav-item dark-light-switch-mode">
                    <input type="checkbox" class="checkbox" id="checkbox">
                    <label for="checkbox" class="checkbox-label">
                      <i class="icon-moon"></i>
                      <i class="icon-sun"></i>
                      <span class="ball"></span>
                    </label>
                </li>
              </ul>
            </div>
          </div>
        </nav>
        <div
          class="offcanvas offcanvas-end"
          tabindex="-1"
          id="offcanvasRight"
          aria-labelledby="offcanvasRightLabel"
        >
          <div class="offcanvas-header">
            <a class="navbar-brand" href="#"
              ><img
                class="offcanvas-logo"
                src=""
                alt=""
            /></a>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="offcanvas"
              aria-label="Close"
            >
              <i class="icon-hamburger-close"></i>
            </button>
          </div>
          <div class="offcanvas-body">
            <ul class="navbar-nav">
              <li class="nav-item">
                <a class="nav-link theme-links" href="#home">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link theme-links" href="#about_us">Resume</a>
              </li>
              <li class="nav-item">
                <a class="nav-link theme-links" href="#solutions">Service</a>
              </li>
                <li class="nav-item dark-light-switch-mode">
                    <input type="checkbox" class="checkbox" id="checkbox_2">
                    <label for="checkbox_2" class="checkbox-label">
                      <i class="icon-moon"></i>
                      <i class="icon-sun"></i>
                      <span class="ball"></span>
                    </label>
                </li>
            </ul>
          </div>
        </div>
      </header>
      <!-- /.header -->
       <main class="main-content">
        <div class="site-wrapper">
          <section class="main-hero-section">
            <div class="content-inner">
               <div class="container container-lg">
              <div class="row">
                <div class="col-lg-5">
                  <div class="col-inner">
                    <div class="hero-heading">
                                                <h1>Ultimate Platform to Manage Tasks & Time <span>Simplify the way you work with our powerful task management platform From organizing daily to-dos to managing complex projects.</span></h1>
                    </div>
                    <!-- /.hero-heading -->
                  </div><!-- /.col-inner -->
                </div>
                <div class=" col-lg-7">
                  <div class="col-inner">
                                <img src="./assets/images/todo-hero.png" alt="">
                  </div><!-- /.col-inner -->
                </div>
              </div><!-- /.row -->
            </div><!-- /.container -->
            </div><!-- /.content-inner -->
          </section><!-- /.main-hero-section -->
        </div><!-- /.site-wrapper -->
       </main><!-- /.main-content -->
       <footer class="footer"></footer><!-- /.footer -->
    
    <script src="assets/js/bootstrap.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
